# Streamlit-Konfiguration für den Alpenbank-Assistenten.
#
# fileWatcherType = "none" deaktiviert das Auto-Reload bei Code-Änderungen.
# Grund: Streamlit's Standard-Watcher scannt alle importierten Module, um
# bei Datei-Änderungen neu zu laden. Dabei stolpert er auf Windows über
# pyarrow (transitive Abhängigkeit von sklearn, geladen via transformers
# via sentence-transformers) und bricht beim DLL-Pfad-Patch mit
# WinError 206 ab. Da unsere App nur per Bedienung läuft (kein klassisches
# Hot-Reload-Bedürfnis), schalten wir den Watcher ganz aus.
[server]
fileWatcherType = "none"

# Dezentes Bank-Farbschema: dunkles Petrol/Navy als Textfarbe und Akzent
# aus dem Header (siehe src/app.py), Gold als sparsam eingesetzte
# Akzentfarbe für Buttons/aktive Elemente. Heller Hintergrund für gute
# Lesbarkeit von Tabellen und SQL-Code-Blöcken.
[theme]
base = "light"
primaryColor = "#C9A227"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#EEF2F5"
textColor = "#1B2A38"
font = "sans serif"
